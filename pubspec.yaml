name: gestock
description: "Application mobile de gestion d'épicerie adaptée au contexte camerounais."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── État & Navigation ──────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0

  # ── Base de données locale ─────────────────────────────────
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  # ── Cache rapide & Sécurité ────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # ── Backend Cloud Firebase ─────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.5
  firebase_crashlytics: ^3.4.15
  firebase_analytics: ^10.8.9

  # ── Réseau ────────────────────────────────────────────────
  dio: ^5.4.1
  connectivity_plus: ^6.0.3

  # ── Médias & Scanner ──────────────────────────────────────
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  mobile_scanner: ^3.5.6

  # ── Génération PDF & Rapports ─────────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^7.2.2

  # ── Graphiques & Statistiques ─────────────────────────────
  fl_chart: ^0.67.0

  # ── Internationalisation & Formatage ──────────────────────
  intl: ^0.20.0

  # ── Injection de dépendances ──────────────────────────────
  get_it: ^7.6.7

  # ── UI & UX ───────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  # Suppression de fluttertoast car il cause des erreurs de compilation Android
  # fluttertoast: ^8.2.4
  awesome_dialog: ^3.2.0
  flutter_slidable: ^3.1.0
  badges: ^3.1.2
  percent_indicator: ^4.2.3

  # ── Utilitaires ───────────────────────────────────────────
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.2.0
  intl_phone_field: ^3.2.0
  get: ^4.7.3
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  analyzer: ^6.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
